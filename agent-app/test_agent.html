<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Agent Side - Create Agreement</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/signature_pad@4.1.7/dist/signature_pad.umd.min.js"></script>
    <style>
        .signature-pad { border: 2px dashed #ccc; background: #fff; width: 100%; height: 150px; }
    </style>
</head>
<body class="bg-gray-100 p-10">

    <div class="max-w-4xl mx-auto bg-white p-8 rounded shadow">
        <h2 class="text-2xl font-bold mb-6 text-green-700">Digital Signatures (Agent View)</h2>

        <div class="mb-6 p-4 bg-yellow-50 border border-yellow-200 rounded">
            <label class="flex items-center space-x-3 cursor-pointer select-none">
                <input type="checkbox" id="signLater" class="w-5 h-5 text-green-600 rounded">
                <span class="text-gray-800 font-semibold">Farmer is not present (Send signing link later)</span>
            </label>
            <p class="text-xs text-gray-500 mt-1 ml-8">If checked, you can submit without farmer's signature now.</p>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-2 gap-8">
            
            <div>
                <h3 class="font-bold mb-2">Agent Signature <span class="text-red-500">*</span></h3>
                <canvas id="agentPad" class="signature-pad"></canvas>
                <div class="flex justify-between mt-2">
                    <span class="text-xs text-gray-400">Sign here as Agent</span>
                    <button onclick="agentPad.clear()" class="text-red-500 text-sm hover:underline">Clear</button>
                </div>
            </div>

            <div id="farmerSection" class="transition-opacity duration-300">
                <h3 class="font-bold mb-2">Farmer Signature</h3>
                <canvas id="farmerPad" class="signature-pad"></canvas>
                <div class="flex justify-between mt-2">
                    <span class="text-xs text-gray-400">Farmer signs here</span>
                    <button onclick="farmerPad.clear()" class="text-red-500 text-sm hover:underline">Clear</button>
                </div>
            </div>

        </div>

        <div class="mt-8 text-right">
            <button class="bg-green-600 text-white px-6 py-2 rounded shadow hover:bg-green-700">
                Submit Agreement
            </button>
        </div>
    </div>

    <script>
        // Canvas Setup
        const agentCanvas = document.getElementById('agentPad');
        const farmerCanvas = document.getElementById('farmerPad');

        // Resize function for high DPI
        function resizeCanvas(canvas) {
            const ratio = Math.max(window.devicePixelRatio || 1, 1);
            canvas.width = canvas.offsetWidth * ratio;
            canvas.height = canvas.offsetHeight * ratio;
            canvas.getContext("2d").scale(ratio, ratio);
        }
        resizeCanvas(agentCanvas);
        resizeCanvas(farmerCanvas);

        const agentPad = new SignaturePad(agentCanvas);
        const farmerPad = new SignaturePad(farmerCanvas);

        // Logic: Checkbox Click করলে Farmer Pad Disable হবে
        document.getElementById('signLater').addEventListener('change', function() {
            const farmerSection = document.getElementById('farmerSection');
            if(this.checked) {
                farmerSection.style.opacity = '0.4'; // ঝাপসা করে দিবে
                farmerSection.style.pointerEvents = 'none'; // ক্লিক করা যাবে না
                farmerPad.clear(); // আগের সাইন থাকলে মুছে যাবে
            } else {
                farmerSection.style.opacity = '1';
                farmerSection.style.pointerEvents = 'auto';
            }
        });
    </script>
</body>
</html>
